backends:
  # User Service Configuration
  user-service:
    name: User Service
    instances:
      - url: ${USER_SERVICE_1_URL}
        weight: 1
        healthy: true
      - url: ${USER_SERVICE_2_URL}
        weight: 1
        healthy: true
      - url: ${USER_SERVICE_3_URL}
        weight: 1
        healthy: true
    healthCheck:
      enabled: true
      path: /health
      interval: 10000              # Check every 10 seconds
      timeout: 3000                # 3 second timeout
      method: GET
    loadBalancing:
      algorithm: round-robin       # round-robin, least-connections, weighted

  # Order Service Configuration
  order-service:
    name: Order Service
    instances:
      - url: ${ORDER_SERVICE_1_URL}
        weight: 2                  # Higher weight = more traffic
        healthy: true
      - url: ${ORDER_SERVICE_2_URL}
        weight: 1
        healthy: true
    healthCheck:
      enabled: true
      path: /health
      interval: 15000
      timeout: 3000
      method: GET
    loadBalancing:
      algorithm: weighted          # Use weighted because different instance sizes

  # Auth Service Configuration
  auth-service:
    name: Auth Service
    instances:
      - url: ${AUTH_SERVICE_1_URL}
        weight: 1
        healthy: true
      - url: ${AUTH_SERVICE_2_URL}
        weight: 1
        healthy: true
    healthCheck:
      enabled: true
      path: /health
      interval: 10000
      timeout: 2000
      method: GET
    loadBalancing:
      algorithm: least-connections # Auth may have long-lived connections
