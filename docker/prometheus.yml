global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['gateway:9090']
        labels:
          service: 'api-gateway'
          environment: 'production'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['gateway:8080']
        labels:
          service: 'gateway-health'
